<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f6f0e1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Minijuegos</title>
    <link rel="icon" type="image/png" sizes="1024x1024" href="assets/icono.png" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    
    <!-- Tailwind CDN & Fonts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "on-secondary-fixed-variant": "#005236",
                        "tertiary-container": "#996100",
                        "surface-container-low": "#eff4ff",
                        "surface-tint": "#0053db",
                        "tertiary-fixed": "#ffddb8",
                        "surface-container": "#e5eeff",

                        "on-tertiary-fixed": "#2a1700",
                        "tertiary": "#784b00",
                        "on-tertiary-fixed-variant": "#653e00",
                        "primary": "#004ac6",
                        "primary-fixed": "#dbe1ff",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-variant": "#d3e4fe",
                        "on-error": "#ffffff",
                        "outline": "#737686",
                        "surface-dim": "#cbdbf5",

                        "primary-container": "#2563eb",
                        "on-tertiary-container": "#ffeedd",
                        "tertiary-fixed-dim": "#ffb95f"

                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",

                    fontFamily: {
                        "headline-md": ["Plus Jakarta Sans"],
                        "hud-number": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "title-sm": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "label-caps": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "headline-md": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "hud-number": ["20px", {"lineHeight": "1.0", "fontWeight": "700"}],
                        "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "title-sm": ["18px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "700"}]

        }

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
  </head>
  <body class="bg-background text-on-surface antialiased min-h-screen pb-safe">
    <div class="bg-layer hidden" aria-hidden="true"></div>
    <main id="app" class="app-shell" role="application" aria-label="Minijuegos"></main>
    <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
